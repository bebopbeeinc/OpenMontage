<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- Mounted at /trivia-captain-reaction by web/server.py. base href lets fetch
     calls use relative paths (api/foo) that resolve under the mount prefix. -->
<base href="/trivia-captain-reaction/" />
<title>Trivia Captain Reaction</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #22e88a;
    --warn: #f0b429;
    --err: #f85149;
    --running: #58a6ff;
    --orange: #C04FE0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  a { color: var(--running); }

  header { padding: 14px 18px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; color: var(--orange); }
  header .meta { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header .links { display: inline-flex; gap: 12px; font-size: 12px; }
  header .links a { text-decoration: none; }
  header .links a:hover { text-decoration: underline; }

  main { display: grid; grid-template-columns: 1fr 480px; gap: 0;
         height: calc(100vh - 53px); }
  main.panel-hidden { grid-template-columns: 1fr; }
  main.panel-hidden .panel { display: none; }
  .rows { overflow: auto; }
  .panel { background: var(--panel); border-left: 1px solid var(--border);
           display: flex; flex-direction: column; overflow: hidden; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; background: var(--bg); text-align: left;
             padding: 10px 8px; border-bottom: 1px solid var(--border);
             color: var(--muted); font-weight: 500; z-index: 1; }
  tbody td { padding: 10px 8px; border-bottom: 1px solid var(--border);
             vertical-align: top; }
  tbody tr:hover { background: #11161d; }
  tr.row-running { background: #14253a; }
  tr.row-queued { background: #1a1f2a; }

  td.day { width: 50px; font-variant-numeric: tabular-nums; color: var(--muted); }
  td.slug { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--orange); max-width: 160px; word-break: break-word; }
  td.status { width: 130px; }
  td.facts { max-width: 360px; position: relative; padding-right: 30px; }
  td.facts .beat { margin-bottom: 5px; line-height: 1.45; }
  td.facts .beat .lbl { display: inline-block; color: var(--muted); font-size: 9px;
                        text-transform: uppercase; letter-spacing: 0.05em;
                        margin-right: 5px; }
  td.facts .beat.hook   { color: var(--text); font-weight: 500; }
  td.facts .beat.fact   { color: var(--text); }
  td.facts .beat.kicker { color: var(--accent); font-weight: 500; }
  td.facts .wc { color: var(--muted); font-size: 10px; margin-top: 4px; }
  td.facts .copy-btn {
    position: absolute; top: 8px; right: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 2px 6px; border-radius: 4px;
    font-size: 10px; cursor: pointer;
  }
  td.facts .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  td.files { width: 110px; }
  td.caption { width: 260px; font-size: 12px; color: var(--text); line-height: 1.4;
               position: relative; padding-right: 30px; vertical-align: top; }
  td.caption .copy-btn {
    position: absolute; top: 8px; right: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 2px 6px; border-radius: 4px;
    font-size: 10px; cursor: pointer;
  }
  td.caption .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  td.caption .caption-empty { color: var(--muted); font-size: 11px; }
  td.actions { width: 1%; white-space: nowrap; }

  .pill { display: inline-block; padding: 2px 7px; border-radius: 10px;
          font-size: 10px; font-weight: 500; }
  .pill.draft             { background: #21262d; color: var(--muted); }
  .pill.ready-to-review   { background: #2a3d2a; color: var(--accent); }
  .pill.ready-to-publish  { background: #3a2e0c; color: var(--warn); }
  .pill.published         { background: #0c3a1f; color: var(--accent); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }


  .state-badge { display: inline-block; padding: 2px 7px; border-radius: 10px;
                 font-size: 10px; font-weight: 500; margin-left: 6px; }
  .state-badge.queued  { background: #1f3a5f; color: var(--running); }
  .state-badge.running { background: #14253a; color: var(--running);
                         animation: pulse 1.4s ease-in-out infinite; }


  button { background: #21262d; color: var(--text); border: 1px solid var(--border);
           padding: 5px 10px; border-radius: 5px; cursor: pointer; font: inherit;
           font-size: 12px; }
  button:hover:not(:disabled) { background: #2d333b; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #1f6f43; border-color: #2ea04c; }
  button.primary:hover:not(:disabled) { background: #2ea04c; }
  button.orange { background: #4a1857; border-color: var(--orange); color: #f3d8fb; }
  button.orange:hover:not(:disabled) { background: #7a2a92; }
  button.warn { background: #6e4a0e; border-color: #b08a2b; }
  button.warn:hover:not(:disabled) { background: #a07016; }
  button.danger { background: #5d1717; border-color: #a83232; color: #ffd7d7; }
  button.danger:hover:not(:disabled) { background: #862020; }
  button.small { padding: 3px 8px; font-size: 11px; }

  .actions .btn-row { display: flex; gap: 6px; flex-direction: column; align-items: stretch; }

  .new-row-bar { padding: 10px 18px; border-bottom: 1px solid var(--border);
                 background: #0a0e14; display: flex; gap: 10px; align-items: center;
                 flex-wrap: wrap; }
  .new-row-bar label { color: var(--muted); font-size: 11px; }
  .new-row-bar input { background: var(--panel); color: var(--text);
                       border: 1px solid var(--border); border-radius: 5px;
                       padding: 5px 8px; font: inherit; font-size: 12px; }
  .new-row-bar input[type="number"] { width: 70px; }
  .new-row-bar input[type="text"] { width: 200px; }
  .new-row-bar .queue-status { color: var(--muted); font-size: 11px; margin-left: auto; }

  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .panel-header h2 { margin: 0; font-size: 14px; }
  .panel-header .panel-meta { color: var(--muted); font-size: 11px; margin-top: 4px; }

  .panel-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .panel-tabs button { flex: 1; border-radius: 0; border: none; border-right: 1px solid var(--border);
                       background: transparent; color: var(--muted); padding: 8px 12px; }
  .panel-tabs button:last-child { border-right: none; }
  .panel-tabs button.active { background: var(--bg); color: var(--text); }

  .log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
         font-size: 12px; padding: 12px 16px; overflow: auto; flex: 1;
         white-space: pre-wrap; word-break: break-word; }
  .log .log-empty { color: var(--muted); font-style: italic; }

  .job-list { padding: 12px 16px; overflow: auto; flex: 1; }
  .job-list .job { display: grid; grid-template-columns: 80px 1fr 70px;
                   gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border);
                   font-size: 12px; cursor: pointer; }
  .job-list .job:hover { background: #1a2030; }
  .job-list .job .id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                       color: var(--muted); }
  .job-list .job .status { text-align: right; }
  .status-queued { color: var(--muted); }
  .status-running { color: var(--running); }
  .status-success { color: var(--accent); }
  .status-error { color: var(--err); }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85);
                    display: flex; align-items: center; justify-content: center;
                    z-index: 10; cursor: zoom-out; padding: 24px; }
  .script-modal { background: var(--panel); border: 1px solid var(--border);
                  border-radius: 8px; padding: 20px; width: min(820px, 100%);
                  max-height: 100%; display: flex; flex-direction: column;
                  gap: 14px; cursor: default; overflow: auto;
                  box-shadow: 0 12px 48px rgba(0,0,0,0.6); }
  .script-modal h2 { margin: 0; font-size: 15px; font-weight: 600; }
  .script-modal .modal-meta { color: var(--muted); font-size: 12px; }
  .script-modal label { display: block; font-size: 11px; color: var(--muted);
                        margin-bottom: 4px; text-transform: uppercase;
                        letter-spacing: 0.04em; }
  .script-modal input, .script-modal textarea {
                           width: 100%;
                           background: var(--bg); color: var(--text);
                           border: 1px solid var(--border); border-radius: 5px;
                           padding: 8px 10px; font: inherit;
                           font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
                           resize: vertical; }
  .script-modal textarea { min-height: 60px; }
  .script-modal textarea.tall { min-height: 200px; }
  .script-modal input:focus, .script-modal textarea:focus {
                  outline: 2px solid var(--orange); outline-offset: -1px; }
  .script-modal .field { display: flex; flex-direction: column; }
  .script-modal .row { display: grid; grid-template-columns: 100px 1fr; gap: 10px; align-items: start; }
  .script-modal .actions-row { display: flex; gap: 8px; justify-content: flex-end;
                               border-top: 1px solid var(--border); padding-top: 12px; }
  .script-modal .actions-row .grow { flex: 1; }
  .script-modal .wc { color: var(--muted); font-size: 11px; margin-top: 2px; }

  video.review { width: 100%; max-height: 480px; background: black;
                 border-radius: 6px; border: 1px solid var(--border); }

  .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px;
           border-radius: 6px; background: var(--panel); border: 1px solid var(--border);
           color: var(--text); font-size: 13px; z-index: 20; max-width: 380px; }
  .toast.err { border-color: var(--err); color: var(--err); }
  .toast.ok { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Trivia Captain Reaction</h1>
  <div class="meta" id="meta">loading…</div>
  <div class="links">
    <a id="link-sheet" href="#" target="_blank" rel="noopener">Queue ↗</a>
    <a id="link-drive" href="#" target="_blank" rel="noopener">Drive ↗</a>
  </div>
  <div class="spacer"></div>
  <button id="toggle-panel-btn" onclick="togglePanel()">Hide log</button>
  <button onclick="loadRows()">Refresh</button>
  <a href="/" style="margin-left:8px; color: var(--muted); text-decoration: none;">← launcher</a>
</header>

<main id="main">
  <div class="rows" id="rows-pane">
    <div class="new-row-bar">
      <label>Add Day</label>
      <input type="number" id="new-day" min="1" placeholder="e.g. 7" />
      <label>Slug (optional)</label>
      <input type="text" id="new-slug" placeholder="auto from question" />
      <button class="primary small" onclick="runSelect()">Select day → brief</button>
      <span id="queue-status" class="queue-status"></span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Day</th>
          <th>Slug</th>
          <th>Status</th>
          <th>Script (VO)</th>
          <th>Caption</th>
          <th>Drive</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7" style="padding: 40px; text-align: center; color: var(--muted);">
          loading rows from TriviaReactionQueue…
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2 id="panel-title">Log</h2>
      <div class="panel-meta" id="panel-meta">no job yet</div>
    </div>
    <div class="panel-tabs">
      <button class="active" data-tab="log" onclick="switchTab('log')">Log</button>
      <button data-tab="jobs" onclick="switchTab('jobs')">Recent Jobs</button>
    </div>
    <div class="log" id="log">
      <span class="log-empty">No job running. Add a Day or click an action on a row.</span>
    </div>
    <div class="job-list" id="job-list" style="display:none;"></div>
  </div>
</main>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
const $ = (id) => document.getElementById(id);
let allRows = [];
let health = null;
let active = { by_slug: {}, by_day: {} };
let activeJobId = null;
let activeEvt = null;
let activeTab = 'log';

async function api(path, opts={}) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}: ${await r.text().catch(()=>'')}`);
  return r.json();
}

function toast(msg, kind='ok') {
  const root = $('toast-root');
  const div = document.createElement('div');
  div.className = `toast ${kind}`;
  div.textContent = msg;
  root.appendChild(div);
  setTimeout(() => div.remove(), 4500);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function statusPillClass(s) {
  if (!s) return 'draft';
  const k = s.toLowerCase().replace(/\s+/g, '-');
  // Map enum strings to css class names (defined in <style>).
  return ({
    'draft': 'draft',
    'ready-to-review': 'ready-to-review',
    'ready-to-publish': 'ready-to-publish',
    'published': 'published',
  })[k] || 'draft';
}

function inFlight(slug, kind) {
  return active.by_slug?.[slug]?.[kind];
}

function dayInFlight(day) {
  return active.by_day?.[day]?.select;
}

function stateBadge(state) {
  if (!state) return '';
  return `<span class="state-badge ${state}">${state}</span>`;
}

function actionsCell(r) {
  const slug = r.slug || '';
  const f = r.files || {};
  const status = (r.status || '').trim();
  const generating = slug && inFlight(slug, 'generate');
  const publishing = slug && inFlight(slug, 'publish');
  const marking    = slug && inFlight(slug, 'mark_published');

  const reviewBtn = f.render_exists
    ? `<button class="small" onclick="openReview('${escapeHtml(slug)}', ${f.render_mtime || 0})">▷ Review</button>`
    : '';

  // Generate: enabled on Draft, Ready to review, OR Ready to publish.
  //   * Draft / Ready to review: first run; status flips Ready to review on
  //     chain start, Ready to publish on chain success.
  //   * Ready to publish: re-generate (e.g. bad take, prompt tweak). Status
  //     walks back to Ready to review during the chain, then forward to
  //     Ready to publish on success. publish.py later replaces the same
  //     Drive file in place so the drive link stays stable.
  const canGenerate = slug && (
    status === 'Draft' || status === 'Ready to review' || status === 'Ready to publish'
  );
  // "Re-generate" whenever a take already exists (clip or render): clicking
  // Generate then overwrites it and spends a fresh OpenArt credit, so the
  // label must agree with the Review button (which also keys on an existing
  // render) and the confirm() guard in runGenerate must fire. Keying on the
  // status string alone (=== 'Ready to publish') mislabeled a 'Ready to
  // review' row that already had a clip/render as "Generate" and skipped the
  // overwrite warning — the "Generate + Review together" inconsistency.
  const isRegen = !!(f.clip_exists || f.render_exists);
  const genLabel = isRegen ? 'Re-generate' : 'Generate';
  const genClass = isRegen ? 'small' : 'orange small';
  const genBtn = canGenerate
    ? `<button class="${genClass}" ${generating?'disabled':''}
         onclick="runGenerate('${escapeHtml(slug)}', ${isRegen ? 'true' : 'false'})">
         ${stateBadge(generating)} ${genLabel}
       </button>`
    : '';

  // Publish: enabled when status is Ready to publish AND a local render exists
  // AND no generate is in flight. The last guard matters now that a re-generate
  // no longer downgrades the status — without it you could re-publish a render
  // that's being half-overwritten mid-regen. (Previously the status drop to
  // 'Ready to review' hid Publish during a regen; that's gone, so guard on
  // `generating` directly.)
  const canPublish = slug && status === 'Ready to publish' && f.render_exists && !generating;
  const pubBtn = canPublish
    ? `<button class="warn small" ${publishing?'disabled':''}
         onclick="runPublish('${escapeHtml(slug)}')">
         ${stateBadge(publishing)} ${(r.drive_link||'').trim() ? 'Re-publish' : 'Publish'}
       </button>`
    : '';

  // Mark as Published: enabled only when a Drive link exists (i.e. publish has run).
  // Status-only flip; the human's signal that the IG post is live.
  const canMark = slug && status === 'Ready to publish' && (r.drive_link||'').trim() && !generating;
  const markBtn = canMark
    ? `<button class="small" ${marking?'disabled':''}
         onclick="runMarkPublished('${escapeHtml(slug)}')">
         ${stateBadge(marking)} ✓ Mark as Published
       </button>`
    : '';

  // Pull from Drive: the row was published on another machine — it carries a
  // Drive link + 'Ready to publish' status but no local render, so it shows
  // 'Generate' (no local artifact) with no Review button. Download the
  // published render + raw clip back into the local project paths to restore a
  // consistent state. Spends no OpenArt credit.
  const needsPull = slug && status === 'Ready to publish'
                    && (r.drive_link||'').trim() && !f.render_exists;
  const pullBtn = needsPull
    ? `<button class="small" ${generating?'disabled':''}
         title="Local render missing — download the published render + clip from Drive"
         onclick="runPull('${escapeHtml(slug)}')">
         ${stateBadge(slug && inFlight(slug, 'pull'))} ⤓ Pull from Drive
       </button>`
    : '';

  return `<div class="btn-row">${pullBtn}${reviewBtn}${genBtn}${pubBtn}${markBtn}</div>`;
}

function filesCell(r) {
  // Two Drive links written by publish.py:
  //   I drive_link      — captioned final mp4 (the posted version)
  //   L drive_clip_link — raw Seedance avatar clip (no captions)
  // We render both as stacked links so the human can grab either.
  const renderLink = (r.drive_link || '').trim();
  const clipLink = (r.drive_clip_link || '').trim();
  if (!renderLink && !clipLink) {
    return '<span style="color: var(--muted); font-size: 11px;">—</span>';
  }
  const parts = [];
  if (renderLink) {
    parts.push(`<a href="${escapeHtml(renderLink)}" target="_blank" rel="noopener" style="font-size:11px;">final ↗</a>`);
  }
  if (clipLink) {
    parts.push(`<a href="${escapeHtml(clipLink)}" target="_blank" rel="noopener" style="font-size:11px; color: var(--muted);">clip ↗</a>`);
  }
  return parts.join('<br>');
}

function scriptCell(r) {
  // The actual spoken script — the three VO beats the script director writes
  // to Queue!F/G/H (hook → fact → kicker). This is what Captain Archibald says in the
  // reel. Draft rows show a placeholder until the script director writes the VO.
  const beats = [
    ['Hook',   (r.hook_vo   || '').trim(), 'hook'],
    ['Fact',   (r.fact_vo   || '').trim(), 'fact'],
    ['Kicker', (r.kicker_vo || '').trim(), 'kicker'],
  ].filter(([, t]) => t);

  if (!beats.length) {
    return '<span class="caption-empty">— no script yet —</span>';
  }

  const full = beats.map(([, t]) => t).join(' ');
  const words = full.split(/\s+/).filter(Boolean).length;
  const body = beats.map(([lbl, t, k]) =>
    `<div class="beat ${k}"><span class="lbl">${lbl}</span>${escapeHtml(t)}</div>`
  ).join('');
  return `${body}<div class="wc">${words} words</div>
    <button class="copy-btn" data-copy="${escapeHtml(full)}"
            onclick="copyText(this)" title="copy full VO">copy</button>`;
}

function captionCell(r) {
  const caption = (r.caption || '').trim();
  if (!caption) {
    return '<span class="caption-empty">—</span>';
  }
  // data-copy holds the raw text; the button click reads it. Using a data
  // attribute is safer than string-interpolating quoted JS — captions
  // contain apostrophes and could otherwise break the onclick handler.
  return `${escapeHtml(caption)}
    <button class="copy-btn" data-copy="${escapeHtml(caption)}"
            onclick="copyText(this)" title="copy caption">copy</button>`;
}

async function copyText(btn) {
  const text = btn.dataset.copy || '';
  try {
    // navigator.clipboard is only defined in "secure contexts" — HTTPS,
    // localhost, or 127.0.0.1. If the page is being viewed over the LAN
    // (e.g. http://192.168.x.x:8765/...) the modern API is undefined, so
    // we fall back to the textarea + execCommand pattern.
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (!ok) throw new Error('execCommand returned false');
    }
    toast('caption copied');
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = orig; }, 1200);
  } catch (e) {
    toast(`copy failed: ${e.message}`, 'err');
  }
}

function renderRows() {
  const tbody = $('tbody');
  if (!allRows.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--muted);">
      no rows yet. Add a Day above to bootstrap the first row.
    </td></tr>`;
    return;
  }
  tbody.innerHTML = allRows.map(r => {
    const status = (r.status || '').trim();
    const klass = statusPillClass(status);
    const rowState = (r.slug && (inFlight(r.slug, 'generate') === 'running'
                                || inFlight(r.slug, 'publish') === 'running'
                                || inFlight(r.slug, 'mark_published') === 'running'))
                   ? 'row-running'
                   : (r.slug && (inFlight(r.slug, 'generate') === 'queued'
                                || inFlight(r.slug, 'publish') === 'queued'
                                || inFlight(r.slug, 'mark_published') === 'queued'))
                   ? 'row-queued' : '';
    return `
      <tr class="${rowState}">
        <td class="day">${r.day || '—'}</td>
        <td class="slug">${escapeHtml(r.slug || '')}</td>
        <td class="status"><span class="pill ${klass}">${escapeHtml(status || 'Draft')}</span></td>
        <td class="facts">${scriptCell(r)}</td>
        <td class="caption">${captionCell(r)}</td>
        <td class="files">${filesCell(r)}</td>
        <td class="actions">${actionsCell(r)}</td>
      </tr>
    `;
  }).join('');
}

async function loadRows() {
  $('meta').textContent = 'loading…';
  try {
    const [h, data] = await Promise.all([api('api/health'), api('api/rows')]);
    health = h;
    $('link-sheet').href = h.queue_sheet_url;
    $('link-drive').href = h.drive_folder_url;
    allRows = data;
    $('meta').textContent =
      `${allRows.length} row(s) · sa=${h.sa_present ? 'ok' : 'MISSING'}`;
    renderRows();
  } catch (e) {
    $('meta').textContent = 'load failed';
    $('tbody').innerHTML =
      `<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--err);">
         load failed: ${escapeHtml(e.message)}
       </td></tr>`;
  }
}

async function refreshActive() {
  try {
    const data = await api('api/active');
    active = data || { by_slug: {}, by_day: {} };
    const qs = $('queue-status');
    const r = data.running_count, q = data.queued_count;
    qs.textContent = (r || q) ? `${r} running · ${q} queued` : '';
    renderRows();
  } catch (e) { /* ignore */ }
}

async function runSelect(prefilledDay, prefilledSlug) {
  const day = prefilledDay != null
    ? prefilledDay
    : parseInt($('new-day').value, 10);
  if (!day || isNaN(day) || day < 1) {
    toast('day must be a positive integer', 'err');
    return;
  }
  const slug = prefilledSlug != null
    ? prefilledSlug
    : ($('new-slug').value || '').trim();
  try {
    const job = await api('api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({kind: 'select', day, slug_override: slug}),
    });
    toast(`select queued (day ${day})`);
    attachToJob(job.id);
    switchTab('log');
    refreshActive();
  } catch (e) {
    toast(`select failed: ${e.message}`, 'err');
  }
}

async function runGenerate(slug, isRegen=false) {
  if (!slug) return;
  if (isRegen && !confirm(`Re-generate ${slug}? This will spend a new OpenArt credit and overwrite the local clip + render. The Drive file (if any) will be replaced in place on the next Publish.`)) return;
  try {
    const job = await api('api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({kind: 'generate', slug, force: isRegen}),
    });
    toast(`${isRegen ? 're-generate' : 'generate'} queued (${slug})`);
    attachToJob(job.id);
    switchTab('log');
    refreshActive();
  } catch (e) {
    toast(`generate failed: ${e.message}`, 'err');
  }
}

async function runPull(slug) {
  if (!slug) return;
  try {
    const job = await api('api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({kind: 'pull', slug}),
    });
    toast(`pull from Drive queued (${slug})`);
    attachToJob(job.id);
    switchTab('log');
    refreshActive();
  } catch (e) {
    toast(`pull failed: ${e.message}`, 'err');
  }
}

async function runPublish(slug) {
  if (!slug) return;
  // Per user memory: never auto-publish. Require explicit confirm.
  if (!confirm(`Upload ${slug}'s render to Drive? `
             + `Make sure you reviewed the rendered video first.`)) return;
  try {
    const job = await api('api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({kind: 'publish', slug}),
    });
    toast(`publish queued (${slug})`);
    attachToJob(job.id);
    switchTab('log');
    refreshActive();
  } catch (e) {
    toast(`publish failed: ${e.message}`, 'err');
  }
}

async function runMarkPublished(slug) {
  if (!slug) return;
  if (!confirm(`Mark ${slug} as Published? Only do this once the Instagram post is live.`)) return;
  try {
    const job = await api('api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({kind: 'mark_published', slug}),
    });
    toast(`mark-published queued (${slug})`);
    attachToJob(job.id);
    refreshActive();
  } catch (e) {
    toast(`mark failed: ${e.message}`, 'err');
  }
}

async function attachToJob(id) {
  if (activeEvt) { activeEvt.close(); activeEvt = null; }
  activeJobId = id;
  $('panel-title').textContent = `Log — ${id}`;
  $('panel-meta').textContent = 'loading…';
  const log = $('log');
  log.innerHTML = '';
  let preStatus = null;
  let seeded = 0;
  try {
    const j = await api(`api/jobs/${id}`);
    preStatus = j.status;
    $('panel-meta').textContent =
      `${j.kind} · ${j.slug || ('day ' + (j.day ?? '?'))} · ${j.status}`;
    for (const line of (j.log || [])) {
      const span = document.createElement('div');
      span.textContent = line;
      log.appendChild(span);
      seeded++;
    }
    log.scrollTop = log.scrollHeight;
  } catch (e) {
    $('panel-meta').textContent = `couldn't load: ${e.message}`;
  }
  if (preStatus === 'success' || preStatus === 'error') {
    if (!seeded) log.innerHTML = '<span class="log-empty">(job finished with no log)</span>';
    return;
  }
  activeEvt = new EventSource(`api/jobs/${id}/stream`);
  activeEvt.onmessage = (e) => {
    const line = JSON.parse(e.data);
    const span = document.createElement('div');
    span.textContent = line;
    log.appendChild(span);
    log.scrollTop = log.scrollHeight;
  };
  activeEvt.onerror = () => {
    $('panel-meta').textContent = 'stream interrupted — falling back to polling';
    if (activeEvt) { activeEvt.close(); activeEvt = null; }
    pollUntilDone(id, log);
  };
  activeEvt.addEventListener('end', async () => {
    activeEvt.close();
    activeEvt = null;
    try {
      const j = await api(`api/jobs/${id}`);
      $('panel-meta').textContent =
        `${j.kind} · ${j.slug || ('day ' + (j.day ?? '?'))} · ${j.status}`;
      if (j.status === 'success') toast(`job ${id} ✓`, 'ok');
      else if (j.status === 'error') toast(`job ${id} ✗ ${j.error || ''}`, 'err');
    } catch (e) {}
    await loadRows();
    await refreshActive();
  });
}

async function pollUntilDone(id, logEl) {
  let lastLen = logEl.childElementCount;
  while (true) {
    let j;
    try { j = await api(`api/jobs/${id}`); }
    catch (e) { return; }
    const lines = j.log || [];
    for (let i = lastLen; i < lines.length; i++) {
      const span = document.createElement('div');
      span.textContent = lines[i];
      logEl.appendChild(span);
    }
    lastLen = lines.length;
    logEl.scrollTop = logEl.scrollHeight;
    if (j.status === 'success' || j.status === 'error') {
      if (j.status === 'success') toast(`job ${id} ✓`, 'ok');
      else                        toast(`job ${id} ✗ ${j.error || ''}`, 'err');
      await loadRows();
      await refreshActive();
      return;
    }
    await new Promise(r => setTimeout(r, 2000));
  }
}

function togglePanel() {
  const main = $('main');
  const hidden = !main.classList.contains('panel-hidden');
  main.classList.toggle('panel-hidden', hidden);
  $('toggle-panel-btn').textContent = hidden ? 'Show log' : 'Hide log';
  try { localStorage.setItem('trivia_captain_reaction_panel_hidden', hidden ? '1' : '0'); }
  catch (e) {}
}

function restorePanelState() {
  let hidden = false;
  try { hidden = localStorage.getItem('trivia_captain_reaction_panel_hidden') === '1'; }
  catch (e) {}
  if (hidden) {
    $('main').classList.add('panel-hidden');
    $('toggle-panel-btn').textContent = 'Show log';
  }
}

async function loadJobs() {
  try {
    const jobs = await api('api/jobs');
    const root = $('job-list');
    if (!jobs.length) {
      root.innerHTML = '<div style="color:var(--muted); font-style:italic;">no jobs yet</div>';
      return;
    }
    root.innerHTML = jobs.map(j => `
      <div class="job" onclick="attachToJob('${j.id}'); switchTab('log');">
        <div class="id">${j.id}</div>
        <div>${escapeHtml(j.kind)} · ${escapeHtml(j.slug || '(day ' + (j.day ?? '?') + ')')}</div>
        <div class="status status-${j.status}">${j.status}</div>
      </div>
    `).join('');
  } catch (e) {
    $('job-list').innerHTML = `<div style="color:var(--err);">${escapeHtml(e.message)}</div>`;
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.panel-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  $('log').style.display = tab === 'log' ? '' : 'none';
  $('job-list').style.display = tab === 'jobs' ? '' : 'none';
  if (tab === 'jobs') loadJobs();
}

// -----------------------------------------------------------------------
// Script editor
// -----------------------------------------------------------------------
function closeModal() { $('modal-root').innerHTML = ''; }

// -----------------------------------------------------------------------
// Render review
// -----------------------------------------------------------------------
function openReview(slug, renderMtime=0) {
  // Cache-bust the video URL with the render's mtime so re-generated takes
  // load fresh instead of replaying a stale browser-cached response.
  const root = $('modal-root');
  const src = `api/render/${encodeURIComponent(slug)}?t=${Math.floor(renderMtime || Date.now()/1000)}`;
  root.innerHTML = `
    <div class="modal-backdrop" onclick="closeModal()">
      <div class="script-modal" onclick="event.stopPropagation()" style="width: min(540px, 100%);">
        <h2>Review — ${escapeHtml(slug)}</h2>
        <div class="modal-meta">
          Watch the rendered video before clicking Publish.
          Look for: caption matches VO, warm purple pill on active word,
          no clipping, no on-screen text from Seedance.
        </div>
        <video class="review" controls autoplay src="${src}"></video>
        <div class="actions-row">
          <span class="grow"></span>
          <button onclick="closeModal()">Close</button>
          <button class="warn" onclick="closeModal(); runPublish('${escapeHtml(slug)}')">
            Publish…
          </button>
        </div>
      </div>
    </div>
  `;
}

// Initial load + slow poll for active jobs.
restorePanelState();
loadRows().then(refreshActive);
setInterval(refreshActive, 3000);
</script>
