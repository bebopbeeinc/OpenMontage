name: trivia-short
version: "0.1"
description: >
  Daily-trivia short pipeline. Produces a ~15s vertical trivia video composed of
  three OpenArt-generated clips (hook 3s / body 8s / closer 4s), xfade-stitched
  with VO + music + SFX, then captioned via Remotion TriviaWithBg and published
  to Drive + the Post Calendar sheet.

  Orchestration is hybrid: the spreadsheet (Posts tab) is the human-facing
  review surface (per-row Final Status / Final Video Link / Final Feedback
  columns), and this pipeline owns the in-repo execution state via standard
  canonical artifacts under projects/<slug>/artifacts/. The brief stage reads
  one sheet row into a brief artifact; the publish stage writes back to the
  same row. Between those two boundaries, the pipeline behaves like every other
  OpenMontage pipeline.

  See scripts/trivia/docs/trivia-video-workflow.md for the human-facing operational guide.
  All rows render photorealistic — the historical per-row Style system has been retired.
category: short_form
stability: beta
default_checkpoint_policy: guided

# Reference video input support
reference_input:
  supported: false

# Production modes — drives whether the asset stage is human-paced or automated.
production_modes:
  - name: manual_openart
    description: >
      Human generates the body + closer clips in the OpenArt web UI, drops the
      resulting mp4s into scripts/trivia/library/bodies/ and scripts/trivia/library/closers/,
      and writes the filenames into Posts!T (body) and Posts!V (closer). The
      reaction segment is already resolved at idea time via the Clips library
      VLOOKUP (Posts!Q). Pipeline waits on the human between script and assets.
    required_tools: []
    best_for:
      - First-time renders where prompt iteration is hands-on
      - Days when the OpenArt automated driver is broken or rate-limited
  - name: automated_openart
    description: >
      scripts/trivia/openart_driver.py drives the OpenArt UI via Playwright,
      generates each segment, drops the mp4 into the matching library directory,
      and writes the filename back to Posts!T or Posts!V. Asset stage auto-proceeds.
    required_tools: []  # script-based for now; future: wrap as registered tool
    best_for:
      - Repeated rows
      - Batch runs of multiple rows
      - When the human is not at the keyboard

orchestration:
  mode: executive-producer
  skill: pipelines/trivia-short/executive-producer
  budget_default_usd: 0.30
  max_revisions_per_stage: 3
  max_send_backs: 2
  max_wall_time_minutes: 20

extensions:
  custom_scripts: true        # scripts/trivia/*.py and scripts/trivia_images/*.py
  custom_playbooks: false
  custom_skills: true
  custom_tools: false         # future: migrate scripts -> tools/ as BaseTool

required_skills:
  - pipelines/trivia-short/executive-producer
  - pipelines/trivia-short/idea-director
  - pipelines/trivia-short/script-director
  - pipelines/trivia-short/asset-director
  - pipelines/trivia-short/edit-director
  - pipelines/trivia-short/compose-director
  - pipelines/trivia-short/publish-director
  - meta/reviewer
  - meta/checkpoint-protocol

compatible_playbooks:
  custom_allowed: true

# External state — the Posts sheet is the SOURCE OF TRUTH for this pipeline.
# Canonical artifacts under projects/<slug>/artifacts/ are DERIVED VIEWS of
# the sheet row; they can be regenerated by re-reading the row. Renders are
# the only data the pipeline produces that doesn't come from the sheet.
#
# Implication: every stage re-reads the sheet at entry. If the relevant row
# cells have changed since the cached artifact was written, the artifact is
# stale and downstream stages must re-run from idea. See
# skills/pipelines/trivia-short/executive-producer.md "Sheet Contract".
external_state:
  - kind: google_sheet
    id: 1EzucrS6yUPfodtt7WVuvW3PjZ1yhWUgfWUowPkMP6Eg
    tab: Posts
    role: source_of_truth
    auth: service_account
    auth_path: ~/.google/claude-sheets-sa.json
    notes: >
      Header row is 4; data starts at row 5. Current layout: 26 columns
      (A:Z), down from 37 pre-2026-05. The sheet owns: row identity,
      script copy (D-K), final status (L), final link (M), reaction
      archetype (N), reaction-clip lookups (O-P VLOOKUP), hook emphasis
      (Q), body+closer prompts/filenames (R-U), posting metadata (V-W),
      hero visuals (X), slug (Y), music track (Z). All rows render
      photorealistic — the per-row Style column (was N) and its Styles
      tab were retired in 2026-05. Deleted in earlier cleanups:
      final_feedback, per-segment Drive URLs, and per-segment Status /
      Feedback columns. Pipeline owns: renders under
      projects/<slug>/renders/ and transient artifacts under
      projects/<slug>/artifacts/. Code resolves column letters at
      runtime via post_row.cell_for; the letters above are reference
      only.
  - kind: google_sheet
    id: 1E19Pv9ur0KsgHxny65rX_CXsT-yHPkbyhqjZTEvJG_E
    tab: Clips
    role: catalog
    auth: service_account
    auth_path: ~/.google/claude-sheets-sa.json
    notes: >
      Pre-recorded reaction-clip catalog (the "clips library"). Tabs:
      `Personas!A:C` (persona_id, label, description) and `Clips!A:M`
      (clip_id, status, archetype, persona_id, persona_short, filename, ...).
      Reaction picking happens at IDEA stage via
      scripts/trivia/pick_reactions_llm.py — the picker chooses a Clip ID by
      matching archetype + persona against the trivia context (especially the
      resolution line), and patches Posts!P + Posts!Q VLOOKUP formulas with
      the chosen clip_id. The Hooks library (id 1lwnBldh_fMAKHWMxQbzRxJ7GQ9m6wf35GR9bRCann8I)
      is a separate sheet used by `assemble_modular.py` for emphasis-word
      defaults; not owned by this stage.
  - kind: google_drive_folder
    id: 1930CVitXd4d6BsZ39EleWyxmtsgaXVGY
    role: deliverable_drop
    auth: service_account

stages:
  - name: idea
    skill: pipelines/trivia-short/idea-director
    produces:
      - brief
      - decision_log
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Sheet row reference is present (slug + row number)
      - Mode is exactly "facts" OR "choices"
      - Reaction Archetype (Reaction Archetype column) is set
      - "Reaction Clip ID is picked from CLIPS_SHEET and locked into Q + R formulas (via pick_reactions_llm.py); pick is informed by the resolution line"
      - "No-reveal guardrail: if H=No reveal, CTA (J) does not leak the answer"
      - Hook copy fits the 3s burned-caption budget (<=8 words, <=2 lines)
      - Target duration is 14.4s (3 + 8 + 4 - 2*0.3 xfade)
    success_criteria:
      - Schema-valid brief artifact
      - metadata.trivia.mode in {facts, choices}
      - metadata.trivia.row is an int >= 5
      - metadata.trivia.slug matches /^[a-z0-9-]+$/
      - metadata.trivia.reaction_clip_id matches /^R\d+$/
      - metadata.trivia.reaction_clip_status in {Generated, Pending, ...}

  - name: script
    skill: pipelines/trivia-short/script-director
    required_artifacts_in:
      - brief
    produces:
      - script
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Each segment prompt (hook/body/closer) is photorealistic and asks for ZERO on-screen text
      - VO copy fits the VO_WINDOWS budgets in scripts/trivia/assemble_modular.py
      - "No-reveal: resolution + CTA do not contain the words true/false when claim is true/false"
      - Brand tokens (Captain, Travel Crush, Fennec, ...) are capitalized in VO copy
    success_criteria:
      - Schema-valid script artifact
      - script.metadata.segments has exactly 3 entries (hook, body, closer)
      - script.metadata.vo has 4 lines (hook, claim, resolution, cta)

  - name: assets
    skill: pipelines/trivia-short/asset-director
    required_artifacts_in:
      - script
      - brief
    produces:
      - asset_manifest
    tools_available: []
    optional_tools: []          # openart_driver.py is a custom_script, not registered
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - All three clips have a source (local filename OR Drive URL)
      - "Per-segment durations: hook ~3s, body ~8s, closer ~4s (+/-0.3s)"
      - Each asset has provenance (model, prompt, source_url or local_path)
      - Per-segment prompt provenance recorded (model, source_url or local_path)
    success_criteria:
      - Schema-valid asset_manifest artifact
      - Exactly 3 video assets, keyed by segment in {hook, body, closer}

  - name: edit
    skill: pipelines/trivia-short/edit-director
    required_artifacts_in:
      - asset_manifest
      - script
      - brief
    produces:
      - edit_decisions
    tools_available: []          # assemble_modular.py is a custom_script
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - "Default flags applied: --with-vo --with-music --with-sfx --silent-hook"
      - "Hook caption emphasis word resolved (Posts!R) and burned in"
      - bg.mp4 written to projects/<slug>/assets/video/bg.mp4
      - "Output duration ~14.4s (+/-0.5s)"
      - SFX cue set matches mode (FACTS vs CHOICES)
    success_criteria:
      - Schema-valid edit_decisions artifact
      - projects/<slug>/assets/video/bg.mp4 exists and passes ffprobe
      - edit_decisions.metadata.assemble_flags includes the four defaults

  - name: compose
    skill: pipelines/trivia-short/compose-director
    required_artifacts_in:
      - edit_decisions
    produces:
      - render_report
    required_tools:
      - transcriber
    tools_available:
      - transcriber
    checkpoint_required: true
    human_approval_default: true   # per user memory: always review renders before saying ready
    review_focus:
      - words.json brand-token post-processing applied (Captain, Travel Crush, ...)
      - Remotion TriviaWithBg composition rendered
      - Final mp4 exists at projects/<slug>/renders/final_with_bg.mp4
      - "MANDATORY self-review: extract frames at key VO beats and verify captions render in TikTok green-pill style with no drift > 200ms"
      - "MANDATORY auto-fix: any defects found during frame review are fixed in-turn (patch words.json, re-render) before signaling done"
    success_criteria:
      - Schema-valid render_report artifact
      - render_report.frame_review_passed = true
      - render_report.output_path = projects/<slug>/renders/final_with_bg.mp4

  - name: publish
    skill: pipelines/trivia-short/publish-director
    required_artifacts_in:
      - render_report
      - brief
    produces:
      - publish_log
    tools_available: []          # publish.py is a custom_script
    checkpoint_required: true
    human_approval_default: true   # per user memory: never auto-run publish.py
    review_focus:
      - Human explicitly approved publication in the current turn
      - Drive file uploaded OR replaced in place (link in M is stable)
      - "Sheet row updated: L=Ready to publish, M=<link>"
    success_criteria:
      - Schema-valid publish_log artifact
      - publish_log.sheet_updates includes L and M for the brief row
      - publish_log.drive_link is a non-empty https URL
