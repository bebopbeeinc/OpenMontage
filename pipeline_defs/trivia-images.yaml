name: trivia-images
version: "0.1"
description: >
  Per-row trivia image pipeline. For one row of a 1-100-format question tab of
  the trivia-questions sheet (default `1-100`), generates the **question image**
  from the question-image prompt and the **answer image** from the answer-image
  prompt — where the answer image is created in OpenArt's "same scene" remix
  mode, taking the freshly generated question image as a reference so both
  share the same environment. Columns resolve by header label
  (scripts/trivia_images/sheet_schema.py), which tolerates column
  inserts/reorders within the 1-100 layout and skips tabs in other layouts.

  Each row is its own project (slug `trivia-q-{N}`). Generated PNGs land in
  the shared image library at `scripts/trivia_images/library/` so the
  downstream trivia-short pipeline keeps finding them at the well-known
  filename. Canonical artifacts and checkpoints live under
  `projects/trivia-q-{N}/artifacts/`.

  See scripts/trivia_images/generate.py for the CLI batch wrapper used to
  run this pipeline across many rows from one invocation.
category: assets
stability: beta
default_checkpoint_policy: guided

reference_input:
  supported: false

extensions:
  custom_scripts: true        # scripts/trivia_images/*.py owns the sheet glue
  custom_playbooks: false
  custom_skills: true
  custom_tools: true          # tools/graphics/openart_image.py

required_skills:
  - pipelines/trivia-images/question-image-director
  - pipelines/trivia-images/answer-image-director
  - meta/reviewer
  - meta/checkpoint-protocol

# External state — the question tabs are the SOURCE OF TRUTH for prompts and
# completion state. The on-disk library is the source of truth for whether
# an image actually exists.
external_state:
  - kind: google_sheet
    id: 1Kh9Ai9-sKyyK1q24jVkQqeIz-Y-0rdNVIjPc2EF8hPk
    tab: "1-100"   # default; the web UI lists every tab matching the 1-100 header layout
    role: source_of_truth
    auth: service_account
    auth_path: ~/.google/claude-sheets-sa.json
    notes: >
      Row 1 = section-header labels, row 2 = column names, row 3+ = data.
      `1-100` is the canonical layout. The pipeline resolves every field
      to its live column by HEADER LABEL at runtime — see
      scripts/trivia_images/sheet_schema.py (FIELD_TO_HEADER holds the
      1-100 labels; SheetSchema does the lookup). Only tabs carrying all
      of 1-100's required labels resolve, so tabs in other layouts are
      skipped by tab discovery: the legacy Brian-style tabs (BrianOld,
      1-250, 251-500, …) use "Number"/"Question IMAGE", and the RN tab
      uses "Correct Answer"/"Button N"/"Answer IMAGE (CORRECT OR
      INCORRECT) Prompt". Future tabs in the 1-100 format are picked up
      automatically. Fields read: `#` (used as the image slug `q{N}`),
      the question-image prompt (`Question IMAGE Prompt`), and the
      answer-image prompt (`Answer IMAGE (CORRECT) Prompt` — a "Same
      Scene" remix prompt that depends on the question image as a
      reference). The 1-100 tab has no completion column, so the ✓
      completion-mark write is skipped and on-disk presence of `q{N}.png`
      is the completion signal. No sheet column tracks answer-image
      completion — presence of `q{N}_answer.png` on disk is the source of
      truth for that.
  - kind: local_directory
    path: scripts/trivia_images/library/
    role: deliverable_drop
    notes: >
      Gitignored library. The full-res original is kept at `q{N}.png` /
      `q{N}_answer.png`, and a 512×384 lossless-PNG game copy is written
      to the `resized/` subdir (`resized/q{N}.png`, …) — see
      scripts/trivia_images/image_optimize.py. The game uses the resized
      copies; the originals are kept "just in case" and are what the
      answer-remix references. Backfill resized copies for pre-existing
      originals with `generate.py --optimize-library` (originals
      untouched). The downstream trivia-short pipeline consumes the
      resized copies by filename.
  - kind: google_drive
    role: deliverable_drop
    notes: >
      Web-UI generations go to Drive (folder IDs in
      scripts/trivia_images/drive_config.py). Full-res originals: `WIP/`
      (staging) → `Question Images/` root (approved). 512×384 resized
      copies: `WIP/Resized/` → `Question Images/Resized/`. Approving an
      image moves BOTH the original and its resized copy to their approved
      folders in lockstep. The game reads `Question Images/Resized/`;
      the web UI points at the resized copies.

      Serving: all image files are made `anyone-with-link: reader` (on upload
      and lazily on first serve — see server.ensure_public). /api/image does
      NOT proxy bytes; it 302-redirects to the public Drive CDN URL
      (`https://drive.google.com/thumbnail?id=<id>&sz=w<256|1024>`), so the
      browser fetches straight from Google's CDN (which also does the
      thumbnail downscale) and this server stays out of the byte path. The
      game can read the same public CDN URLs.

      If a resized copy is missing but the original exists (an image generated
      before resizing existed), /api/image serves the original's CDN URL and
      kicks off a background migration that creates the resized copy in the
      matching Resized subfolder (server.migrate_resized); the next view serves
      the resized. Backfill resized copies up front with
      `scripts/trivia_images/optimize_drive.py` (originals untouched either
      way).

# Future stages can be added before `question_image` — most likely a
# `prompts` stage that generates the question + answer image prompt copy from the row's
# question/answer context, then writes them back to the sheet. For now
# prompts are authored manually in the sheet.
stages:
  - name: question_image
    skill: pipelines/trivia-images/question-image-director
    produces:
      - asset_manifest
    required_tools:
      - openart_image
    tools_available:
      - openart_image
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Row number is present and the row has a non-empty question-image prompt
      - Full-res original at scripts/trivia_images/library/q{N}.png and the
        512×384 resized copy at scripts/trivia_images/library/resized/q{N}.png
      - asset_manifest records model, provider, prompt, and the slug `q{N}`
      - The resized copy opens without error and is exactly 512×384 (game size)
    success_criteria:
      - Schema-valid asset_manifest artifact
      - asset_manifest.assets contains exactly one image entry with
        scene_id == `q{N}` and type == "image"
      - The file referenced by the asset's `path` exists on disk
      - The resized copy `resized/q{N}.png` exists (the 1-100 tab has no
        completion column, so the ✓ completion-mark write is skipped — disk
        presence is the signal)

  - name: answer_image
    skill: pipelines/trivia-images/answer-image-director
    required_artifacts_in:
      - asset_manifest
    produces:
      - asset_manifest
    required_tools:
      - openart_image
    tools_available:
      - openart_image
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Question image `q{N}.png` exists and is passed to OpenArt as the
        reference / source image
      - The answer-image prompt is the "Same Scene" variant — it should
        describe the answer scene while sharing the environment of the
        question-image prompt
      - Output landed at scripts/trivia_images/library/q{N}_answer.<ext>
      - asset_manifest accumulates BOTH images (question + answer) so
        the downstream trivia-short pipeline can read them as a pair
    success_criteria:
      - Schema-valid asset_manifest artifact
      - asset_manifest.assets contains two image entries — one with
        scene_id == `q{N}` (the question) and one with scene_id ==
        `q{N}_answer` (the answer)
      - The answer image asset records the question image path under
        `metadata.reference_image_path` (carried through as a free-form
        metadata field on the asset's `generation_summary`)
      - Both files referenced exist on disk
